app:
  default_model: gpt52
  max_context_chunks: 6
  system_prompt: |
    You are a grounded assistant. Use retrieved context when relevant,
    cite chunk ids when possible, and clearly say when context is missing.

models:
  gpt52:
    provider: azure_foundry
    endpoint: https://YOUR_FOUNDRY_ENDPOINT.services.ai.azure.com
    api_key: YOUR_GPT52_FOUNDRY_API_KEY
    model: gpt-5.2
    api_version: 2025-04-01-preview
    chat_path: /openai/responses
  claude_sonnet:
    provider: azure_foundry
    endpoint: https://YOUR_FOUNDRY_ENDPOINT.services.ai.azure.com
    api_key: YOUR_CLAUDE_SONNET_API_KEY
    model: claude-sonnet-4-6
    api_version: 2024-05-01-preview
    chat_path: /chat/completions

embeddings:
  provider: ollama
  base_url: http://127.0.0.1:11434
  model: qwen3-embedding:4b
  dimensions: null
  timeout_seconds: 120
  keep_alive: 10m

  # Optional Foundry embedding config:
  # provider: azure_foundry
  # endpoint: https://YOUR_FOUNDRY_ENDPOINT.services.ai.azure.com
  # api_key: YOUR_EMBEDDING_API_KEY
  # model: text-embedding-3-large
  # api_version: 2024-05-01-preview
  # embed_path: /embeddings
  # dimensions: 3072

database:
  host: localhost
  port: 5432
  dbname: pgrag
  user: pgrag
  password: ${PGRAG_DB_PASSWORD}
  sslmode: disable
  embedding_type: halfvec

retrieval:
  default_profile: balanced
  profiles:
    balanced:
      final_k: 8
      vector:
        k: 40
        metric: cosine
        ef_search: 100
        min_score: 0.0
      lexical:
        k: 40
        language: english
        min_score: 0.0
      hybrid:
        mode: rrf
        vector_weight: 0.6
        lexical_weight: 0.4
        rrf_k: 60
      reranker:
        mode: none
        # mode: llm
        # model_alias: gpt52
        top_n: 40
        keep_n: 8
        min_score: 0.0
        temperature: 0.0
        max_tokens: 800
      context:
        max_chunks: 6
        max_chars_per_chunk: 1200

    high_recall:
      final_k: 10
      vector:
        k: 80
        metric: cosine
        ef_search: 120
        min_score: -1.0
      lexical:
        k: 80
        language: english
        min_score: 0.0
      hybrid:
        mode: rrf
        vector_weight: 0.55
        lexical_weight: 0.45
        rrf_k: 80
      reranker:
        mode: none
        top_n: 60
        keep_n: 10
        min_score: 0.0
        temperature: 0.0
        max_tokens: 1000
      context:
        max_chunks: 8
        max_chars_per_chunk: 1200

    high_precision:
      final_k: 6
      vector:
        k: 30
        metric: cosine
        ef_search: 80
        min_score: 0.0
      lexical:
        k: 30
        language: english
        min_score: 0.0
      hybrid:
        mode: weighted
        vector_weight: 0.7
        lexical_weight: 0.3
        rrf_k: 60
      reranker:
        mode: none
        top_n: 24
        keep_n: 6
        min_score: 0.0
        temperature: 0.0
        max_tokens: 700
      context:
        max_chunks: 6
        max_chars_per_chunk: 1000
